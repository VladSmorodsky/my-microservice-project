replicaCount: 2

image:
  repository: 590183992909.dkr.ecr.us-east-1.amazonaws.com/my-app
  tag: "7" # Оновлено для відповідності ArgoCD deployment
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ecr-registry-secret

containerPort: 8000

service:
  type: LoadBalancer
  port: 80

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  enabled: true
  httpGet:
    path: /doctor
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /doctor
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Non-sensitive environment variables for Django (migrated from Topic 4).
# Rendered into a ConfigMap and injected via envFrom.
config:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  # DB connection: static parts here; DATABASE_HOST + DATABASE_PASSWORD + SECRET_KEY
  # come from the Kubernetes Secret that Terraform creates from RDS outputs
  # (див. kubernetes_secret_v1.django_db у main.tf). Жодних захардкоджених ендпоінтів.
  DATABASE_NAME: "myapp"
  DATABASE_USER: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_ENGINE: "django.db.backends.postgresql"

# Secrets are created EXTERNALLY (not managed by Helm)
#
# Create once before deploying:
#   ./create-django-secrets.sh
#
# This creates a Kubernetes Secret manually, not stored in Git.
# Helm will use the existing Secret (not create it).
#
# For production alternatives, see SECRETS_MANAGEMENT.md
secrets: {}  # Empty - use external Secret
